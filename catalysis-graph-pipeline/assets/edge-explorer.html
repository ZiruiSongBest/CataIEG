<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>CataIEG Edge Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;background:#0f172a;color:#e2e8f0;display:flex;height:100vh;overflow:hidden}

/* ===== Left Sidebar ===== */
.sidebar{width:280px;min-width:280px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;height:100vh}
.sidebar-header{padding:20px;border-bottom:1px solid #334155}
.sidebar-header h1{font-size:15px;font-weight:700;color:#f8fafc;letter-spacing:0.5px}
.sidebar-header .subtitle{font-size:11px;color:#64748b;margin-top:4px}
.overview-stats{padding:16px 20px;border-bottom:1px solid #334155;font-size:12px;color:#94a3b8}
.overview-stats .stat-row{display:flex;justify-content:space-between;padding:3px 0}
.overview-stats .stat-val{color:#f8fafc;font-weight:600;font-variant-numeric:tabular-nums}

.task-tabs{flex:1;overflow-y:auto;padding:8px 0}
.task-tab{padding:12px 20px;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:12px}
.task-tab:hover{background:#334155}
.task-tab.active{background:rgba(59,130,246,0.1);border-left-color:var(--tab-color)}
.task-tab .tab-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.task-tab .tab-info{flex:1;min-width:0}
.task-tab .tab-name{font-size:13px;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-tab .tab-desc{font-size:11px;color:#64748b;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-tab .tab-count{font-size:12px;font-weight:700;color:#94a3b8;font-variant-numeric:tabular-nums}

/* ===== Main Content ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
.top-bar{display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid #334155;background:#1e293b}
.top-bar h2{font-size:16px;font-weight:700;color:#f8fafc;flex:1}
.top-bar .filter-input{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:7px 14px;color:#e2e8f0;font-size:13px;width:280px;outline:none}
.top-bar .filter-input:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,0.2)}
.top-bar .toggle-btn{padding:6px 14px;background:#334155;border:1px solid #475569;border-radius:6px;color:#e2e8f0;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.top-bar .toggle-btn:hover{background:#475569}
.top-bar .toggle-btn.active{background:#3b82f6;border-color:#3b82f6}

/* Content area */
.content{flex:1;overflow-y:auto;padding:24px}

/* Edge type cards for task view */
.edge-type-section{margin-bottom:20px}
.edge-type-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;user-select:none}
.edge-type-header .etype-name{font-size:14px;font-weight:700;color:#f8fafc;font-family:"Fira Code",monospace}
.edge-type-header .etype-count{font-size:12px;color:#64748b;background:#334155;padding:2px 10px;border-radius:12px;font-variant-numeric:tabular-nums}
.edge-type-header .etype-arrow{font-size:10px;color:#64748b;transition:transform 0.2s}
.edge-type-header .etype-arrow.collapsed{transform:rotate(-90deg)}

/* Example edges */
.edge-examples{margin-left:16px;border-left:2px solid #334155;padding-left:16px}
.edge-example{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.edge-example .ex-src,.edge-example .ex-tgt{background:#1e293b;border:1px solid #334155;padding:4px 10px;border-radius:6px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edge-example .ex-src{color:#60a5fa}
.edge-example .ex-tgt{color:#34d399}
.edge-example .ex-arrow{color:#64748b;font-size:16px;flex-shrink:0}
.edge-example .ex-type-badge{font-size:10px;color:#94a3b8;background:#1e293b;border:1px solid #475569;padding:1px 6px;border-radius:4px}

/* ===== Co-occurrence table ===== */
.co-table-wrap{overflow-x:auto}
table.co-table{width:100%;border-collapse:collapse;font-size:13px}
table.co-table th{text-align:left;padding:10px 12px;background:#1e293b;color:#94a3b8;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #334155;position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
table.co-table th:hover{color:#f8fafc}
table.co-table th .sort-icon{margin-left:4px;font-size:10px}
table.co-table td{padding:8px 12px;border-bottom:1px solid #1e293b;vertical-align:top}
table.co-table tr:hover td{background:rgba(59,130,246,0.05)}
table.co-table .etype-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.etype-LIKELY_USES{background:rgba(59,130,246,0.15);color:#60a5fa}
.etype-LIKELY_ASSOCIATED_WITH{background:rgba(168,85,247,0.15);color:#c084fc}
.etype-LIKELY_SUPPORTS{background:rgba(236,72,153,0.15);color:#f472b6}

.onto-type-tag{font-size:10px;color:#64748b;background:#1e293b;border:1px solid #334155;padding:0 5px;border-radius:3px;margin-left:4px}
.co-name{color:#f1f5f9;font-weight:500}
.co-count{font-variant-numeric:tabular-nums;font-weight:700;color:#f8fafc;text-align:center}
.co-papers{font-variant-numeric:tabular-nums;font-weight:600}
.co-papers.multi{color:#22c55e}
.co-papers.single{color:#64748b}
.co-years{font-size:12px;color:#94a3b8;white-space:nowrap}

/* Paper list in expanded row */
.paper-list-expand{display:none;padding:8px 12px 12px 12px;background:#0f172a;border-bottom:1px solid #334155}
.paper-list-expand.open{display:table-row}
.paper-list-expand td{padding:8px 12px}
.paper-chip{display:inline-block;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:3px 8px;margin:2px;font-size:11px;color:#94a3b8;cursor:default}
.paper-chip .p-year{color:#3b82f6;font-weight:600;margin-right:4px}
.paper-chip a{color:#94a3b8;text-decoration:none}
.paper-chip a:hover{color:#60a5fa;text-decoration:underline}

/* Summary cards */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.summary-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;text-align:center}
.summary-card .sc-val{font-size:28px;font-weight:800;color:#f8fafc;font-variant-numeric:tabular-nums}
.summary-card .sc-label{font-size:11px;color:#64748b;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}

/* Bar chart */
.bar-chart{margin:16px 0}
.bar-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.bar-label{width:220px;min-width:220px;font-size:12px;color:#94a3b8;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:"Fira Code",monospace}
.bar-track{flex:1;height:20px;background:#1e293b;border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width 0.4s ease;display:flex;align-items:center;padding-left:8px}
.bar-fill span{font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}

/* Scroll hint */
.scroll-hint{text-align:center;padding:16px;color:#475569;font-size:12px}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>EDGE EXPLORER</h1>
    <div class="subtitle">CataIEG · Heterogeneous Catalysis Evidence Graph</div>
  </div>
  <div class="overview-stats" id="overview-stats"></div>
  <div class="task-tabs" id="task-tabs"></div>
</div>

<div class="main">
  <div class="top-bar" id="top-bar">
    <h2 id="view-title">Overview</h2>
    <input type="text" class="filter-input" id="filter-input" placeholder="搜索边类型、本体名称...">
    <button class="toggle-btn" id="btn-cross-only">仅跨论文</button>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
let DATA = null;
let currentTab = "overview";
let filterText = "";
let crossOnly = false;
let sortCol = "witness_paper_count";
let sortAsc = false;

// ===== Load Data =====
fetch("edge_explorer_data.json")
  .then(r => r.json())
  .then(data => { DATA = data; init(); })
  .catch(err => {
    document.getElementById("content").innerHTML =
      `<div style="padding:40px;text-align:center;color:#64748b">Failed to load data: ${err.message}<br>请确保 edge_explorer_data.json 在同一目录</div>`;
  });

function init() {
  renderOverviewStats();
  renderTabs();
  renderView();
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtNum(n) { return n.toLocaleString(); }

// ===== Sidebar =====
function renderOverviewStats() {
  const s = DATA.summary;
  document.getElementById("overview-stats").innerHTML = `
    <div class="stat-row"><span>总节点数</span><span class="stat-val">${fmtNum(s.total_nodes)}</span></div>
    <div class="stat-row"><span>总边数</span><span class="stat-val">${fmtNum(s.total_edges)}</span></div>
    <div class="stat-row"><span>边类型数</span><span class="stat-val">${s.total_edge_types}</span></div>
    <div class="stat-row"><span>本体共现边</span><span class="stat-val">${fmtNum(s.total_co_occur)}</span></div>
    <div class="stat-row"><span>跨论文共现</span><span class="stat-val">${fmtNum(s.cross_paper_co_occur)}</span></div>
  `;
}

function renderTabs() {
  const container = document.getElementById("task-tabs");
  // Overview tab
  let html = `<div class="task-tab ${currentTab==="overview"?"active":""}" data-tab="overview" style="--tab-color:#64748b">
    <div class="tab-dot" style="background:#64748b"></div>
    <div class="tab-info"><div class="tab-name">Overview</div><div class="tab-desc">全局统计与分布</div></div>
    <div class="tab-count">${fmtNum(DATA.summary.total_edges)}</div>
  </div>`;

  for (const tg of DATA.task_groups) {
    html += `<div class="task-tab ${currentTab===tg.task_id?"active":""}" data-tab="${tg.task_id}" style="--tab-color:${tg.color}">
      <div class="tab-dot" style="background:${tg.color}"></div>
      <div class="tab-info"><div class="tab-name">${esc(tg.task_name)}</div><div class="tab-desc">${esc(tg.task_desc)}</div></div>
      <div class="tab-count">${fmtNum(tg.total_edges)}</div>
    </div>`;
  }

  // Co-occurrence tab
  html += `<div class="task-tab ${currentTab==="cooccur"?"active":""}" data-tab="cooccur" style="--tab-color:#eab308">
    <div class="tab-dot" style="background:linear-gradient(135deg,#3b82f6,#ec4899)"></div>
    <div class="tab-info"><div class="tab-name">Co-occurrence Detail</div><div class="tab-desc">本体共现边完整列表</div></div>
    <div class="tab-count">${fmtNum(DATA.co_occur_edges.length)}</div>
  </div>`;

  container.innerHTML = html;
  container.querySelectorAll(".task-tab").forEach(el => {
    el.onclick = () => { currentTab = el.dataset.tab; renderTabs(); renderView(); };
  });
}

// ===== Main View =====
function renderView() {
  const content = document.getElementById("content");
  const title = document.getElementById("view-title");
  const crossBtn = document.getElementById("btn-cross-only");
  const filterInput = document.getElementById("filter-input");

  crossBtn.style.display = currentTab === "cooccur" ? "inline-block" : "none";
  filterInput.style.display = currentTab === "cooccur" ? "inline-block" : currentTab === "overview" ? "none" : "inline-block";

  if (currentTab === "overview") {
    title.textContent = "Overview · 全局边分布";
    renderOverview(content);
  } else if (currentTab === "cooccur") {
    title.textContent = "Co-occurrence Detail · 本体共现边";
    renderCoOccurTable(content);
  } else {
    const tg = DATA.task_groups.find(t => t.task_id === currentTab);
    if (tg) {
      title.textContent = tg.task_name;
      renderTaskView(content, tg);
    }
  }
}

// ===== Overview =====
function renderOverview(el) {
  const s = DATA.summary;
  let html = `<div class="summary-grid">
    <div class="summary-card"><div class="sc-val">${fmtNum(s.total_edges)}</div><div class="sc-label">Total Edges</div></div>
    <div class="summary-card"><div class="sc-val">${s.total_edge_types}</div><div class="sc-label">Edge Types</div></div>
    <div class="summary-card"><div class="sc-val">${fmtNum(s.total_co_occur)}</div><div class="sc-label">Co-occurrence Edges</div></div>
    <div class="summary-card"><div class="sc-val">${fmtNum(s.cross_paper_co_occur)}</div><div class="sc-label">Cross-Paper (2+ papers)</div></div>
  </div>`;

  // Bar chart: edges per task
  html += `<h3 style="font-size:14px;color:#94a3b8;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Edges by Task Category</h3>`;
  const maxEdges = Math.max(...DATA.task_groups.map(t => t.total_edges));
  html += `<div class="bar-chart">`;
  for (const tg of DATA.task_groups) {
    const pct = (tg.total_edges / maxEdges * 100).toFixed(1);
    html += `<div class="bar-row">
      <div class="bar-label">${esc(tg.task_name)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${tg.color}"><span>${fmtNum(tg.total_edges)}</span></div></div>
    </div>`;
  }
  html += `</div>`;

  // Bar chart: top edge types
  html += `<h3 style="font-size:14px;color:#94a3b8;margin:24px 0 12px;text-transform:uppercase;letter-spacing:1px">Top Edge Types</h3>`;
  const allTypes = [];
  for (const tg of DATA.task_groups) {
    for (const ts of tg.type_stats) {
      allTypes.push({...ts, color: tg.color, task: tg.task_id});
    }
  }
  allTypes.sort((a,b) => b.count - a.count);
  const maxType = allTypes[0]?.count || 1;
  html += `<div class="bar-chart">`;
  for (const t of allTypes.slice(0, 20)) {
    const pct = (t.count / maxType * 100).toFixed(1);
    html += `<div class="bar-row">
      <div class="bar-label">${esc(t.edge_type)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${t.color}"><span>${fmtNum(t.count)}</span></div></div>
    </div>`;
  }
  html += `</div>`;

  // Co-occurrence summary
  html += `<h3 style="font-size:14px;color:#94a3b8;margin:24px 0 12px;text-transform:uppercase;letter-spacing:1px">Cross-Paper Co-occurrence Breakdown</h3>`;
  const coTypes = {};
  for (const e of DATA.co_occur_edges) {
    if (!coTypes[e.edge_type]) coTypes[e.edge_type] = {total:0, cross:0};
    coTypes[e.edge_type].total++;
    if (e.witness_paper_count > 1) coTypes[e.edge_type].cross++;
  }
  html += `<div class="summary-grid">`;
  for (const [et, info] of Object.entries(coTypes)) {
    const cls = `etype-${et}`;
    html += `<div class="summary-card">
      <div class="sc-val">${fmtNum(info.total)}</div>
      <div class="sc-label"><span class="etype-badge ${cls}">${et.replace(/_/g," ")}</span></div>
      <div style="font-size:11px;color:#22c55e;margin-top:6px">${info.cross} cross-paper</div>
    </div>`;
  }
  html += `</div>`;

  el.innerHTML = html;
}

// ===== Task View =====
function renderTaskView(el, tg) {
  const q = filterText.toLowerCase();
  let html = `<div style="margin-bottom:16px;padding:12px 16px;background:#1e293b;border:1px solid #334155;border-radius:8px;border-left:4px solid ${tg.color}">
    <div style="font-size:13px;color:#94a3b8">${esc(tg.task_desc)}</div>
    <div style="font-size:12px;color:#64748b;margin-top:4px">${tg.type_stats.length} edge types · ${fmtNum(tg.total_edges)} edges total</div>
  </div>`;

  for (const ts of tg.type_stats) {
    if (q && !ts.edge_type.toLowerCase().includes(q)) continue;
    const samples = DATA.edge_samples[ts.edge_type.replace(/ \(from .*\)/, "")] || [];
    const secId = `sec-${ts.edge_type.replace(/[^a-zA-Z0-9]/g,"_")}`;

    html += `<div class="edge-type-section">`;
    html += `<div class="edge-type-header" onclick="toggleSec('${secId}')">
      <span class="etype-arrow" id="arrow-${secId}">▼</span>
      <span class="etype-name">${esc(ts.edge_type)}</span>
      <span class="etype-count">${fmtNum(ts.count)}</span>
    </div>`;
    html += `<div id="${secId}" class="edge-examples">`;
    if (samples.length === 0) {
      html += `<div style="font-size:12px;color:#475569;padding:8px 0">No samples available</div>`;
    }
    for (const s of samples) {
      html += `<div class="edge-example">
        <span class="ex-type-badge">${esc(s.source_type)}</span>
        <span class="ex-src" title="${esc(s.source)}">${esc(s.source_label)}</span>
        <span class="ex-arrow">→</span>
        <span class="ex-type-badge">${esc(s.target_type)}</span>
        <span class="ex-tgt" title="${esc(s.target)}">${esc(s.target_label)}</span>
      </div>`;
    }
    html += `</div></div>`;
  }
  el.innerHTML = html;
}

function toggleSec(id) {
  const el = document.getElementById(id);
  const arrow = document.getElementById("arrow-" + id);
  if (el.style.display === "none") { el.style.display = "block"; arrow.classList.remove("collapsed"); }
  else { el.style.display = "none"; arrow.classList.add("collapsed"); }
}

// ===== Co-occurrence Table =====
function renderCoOccurTable(el) {
  const q = filterText.toLowerCase();
  let items = DATA.co_occur_edges;
  if (q) items = items.filter(e =>
    e.source_name.toLowerCase().includes(q) ||
    e.target_name.toLowerCase().includes(q) ||
    e.edge_type.toLowerCase().includes(q) ||
    e.source_onto_type.toLowerCase().includes(q) ||
    e.target_onto_type.toLowerCase().includes(q)
  );
  if (crossOnly) items = items.filter(e => e.witness_paper_count > 1);

  // Sort
  items = [...items];
  items.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === "string") { va = va.toLowerCase(); vb = (vb||"").toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  let html = `<div style="margin-bottom:12px;font-size:12px;color:#64748b">${fmtNum(items.length)} edges shown</div>`;
  html += `<div class="co-table-wrap"><table class="co-table">`;
  html += `<thead><tr>
    <th data-col="edge_type" onclick="sortBy('edge_type')">Type${sortIcon("edge_type")}</th>
    <th data-col="source_name" onclick="sortBy('source_name')">Source${sortIcon("source_name")}</th>
    <th data-col="target_name" onclick="sortBy('target_name')">Target${sortIcon("target_name")}</th>
    <th data-col="co_occurrence_count" onclick="sortBy('co_occurrence_count')" style="text-align:center">Co-occur${sortIcon("co_occurrence_count")}</th>
    <th data-col="witness_paper_count" onclick="sortBy('witness_paper_count')" style="text-align:center">Papers${sortIcon("witness_paper_count")}</th>
    <th data-col="first_year" onclick="sortBy('first_year')">Years${sortIcon("first_year")}</th>
  </tr></thead><tbody>`;

  for (let i = 0; i < items.length; i++) {
    const e = items[i];
    const cls = `etype-${e.edge_type}`;
    const paperCls = e.witness_paper_count > 1 ? "multi" : "single";
    html += `<tr onclick="togglePapers(${i})" style="cursor:pointer">
      <td><span class="etype-badge ${cls}">${e.edge_type.replace(/_/g," ")}</span></td>
      <td><span class="co-name">${esc(e.source_name)}</span><span class="onto-type-tag">${esc(e.source_onto_type)}</span></td>
      <td><span class="co-name">${esc(e.target_name)}</span><span class="onto-type-tag">${esc(e.target_onto_type)}</span></td>
      <td class="co-count">${e.co_occurrence_count}</td>
      <td class="co-papers ${paperCls}" style="text-align:center">${e.witness_paper_count}</td>
      <td class="co-years">${e.first_year||"?"}–${e.last_year||"?"}</td>
    </tr>`;
    // Expandable paper list
    html += `<tr class="paper-list-expand" id="papers-${i}"><td colspan="6">`;
    html += `<div style="font-size:11px;color:#64748b;margin-bottom:6px">Witness Papers (${e.witness_papers.length}):</div>`;
    for (const p of e.witness_papers) {
      const info = DATA.paper_titles[p] || {};
      const doi = info.doi || p.replace("paper:","").replace(/_/g,"/");
      const title = info.title ? info.title.substring(0,60) + (info.title.length>60?"...":"") : doi;
      html += `<span class="paper-chip"><span class="p-year">${info.year||"?"}</span><a href="https://doi.org/${doi}" target="_blank" title="${esc(info.title||doi)}">${esc(title)}</a></span>`;
    }
    html += `</td></tr>`;
  }
  html += `</tbody></table></div>`;
  if (items.length > 50) html += `<div class="scroll-hint">↑ Scroll to see all ${fmtNum(items.length)} edges</div>`;

  el.innerHTML = html;
}

function sortIcon(col) {
  if (sortCol !== col) return '<span class="sort-icon">⇅</span>';
  return `<span class="sort-icon">${sortAsc ? "↑" : "↓"}</span>`;
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  renderView();
}

window.togglePapers = function(idx) {
  const row = document.getElementById("papers-" + idx);
  if (row) row.classList.toggle("open");
};

// ===== Filter & Toggle =====
document.getElementById("filter-input").addEventListener("input", e => {
  filterText = e.target.value;
  renderView();
});

document.getElementById("btn-cross-only").addEventListener("click", () => {
  crossOnly = !crossOnly;
  document.getElementById("btn-cross-only").classList.toggle("active", crossOnly);
  renderView();
});

// Keyboard
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  const tabs = ["overview", ...DATA.task_groups.map(t=>t.task_id), "cooccur"];
  const ci = tabs.indexOf(currentTab);
  if ((e.key === "ArrowDown" || e.key === "j") && ci < tabs.length-1) { currentTab = tabs[ci+1]; renderTabs(); renderView(); e.preventDefault(); }
  if ((e.key === "ArrowUp" || e.key === "k") && ci > 0) { currentTab = tabs[ci-1]; renderTabs(); renderView(); e.preventDefault(); }
});
</script>
</body>
